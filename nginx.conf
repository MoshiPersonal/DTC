# Dolf Training Center — nginx server config
# Served from /etc/nginx/conf.d/default.conf inside the image.

server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # UTF-8 for HTML/JS so Arabic content renders correctly
    charset       utf-8;
    charset_types text/html text/css application/javascript application/json image/svg+xml;

    # ---- Compression ----
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/xml application/xml+rss;

    # ---- Security headers (inherited by locations that set no add_header) ----
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-Frame-Options        "SAMEORIGIN"                  always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Health check endpoint (used by Docker HEALTHCHECK / load balancers)
    location = /healthz {
        access_log   off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Long-lived caching for static assets (use only `expires` so the
    # inherited security headers above are preserved)
    location ~* \.(?:css|js|png|jpe?g|gif|svg|webp|ico|woff2?)$ {
        expires    30d;
        access_log off;
    }

    # HTML: always revalidate so content updates show immediately.
    # Falls back to index.html for any unknown path (single-page site).
    location / {
        try_files $uri $uri/ /index.html;
        expires   -1;
    }
}
